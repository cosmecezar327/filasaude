<!--index.html-->
```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Cadastro Paciente</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="mb-4">
Cadastro de Paciente
</h1>


<form
th:action="@{/pacientes/salvar}"
th:object="${paciente}"
method="post">

<input type="hidden"
th:field="*{id}">


<div class="mb-3">

<label class="form-label">
Nome
</label>

<input
type="text"
class="form-control"
th:field="*{nome}"
required>

</div>



<div class="mb-3">

<label class="form-label">
CPF
</label>

<input
type="text"
class="form-control"
th:field="*{cpf}"
required>

</div>



<div class="mb-3">

<label class="form-label">
Idade
</label>

<input
type="number"
class="form-control"
th:field="*{idade}">

</div>


<div class="mb-3">

<label class="form-label">
Sexo
</label>

<br>

<input
type="radio"
th:field="*{sexo}"
value="Masculino">

Masculino


<input
type="radio"
class="ms-3"
th:field="*{sexo}"
value="Feminino">

Feminino

</div>



<div class="mb-3">

<label class="form-label">

Condições

</label>

<br>

<input
type="checkbox"
th:field="*{habilidades}"
value="Diabetes">

Diabetes

<br>

<input
type="checkbox"
th:field="*{habilidades}"
value="Hipertensao">

Hipertensão

<br>

<input
type="checkbox"
th:field="*{habilidades}"
value="Cardiaco">

Cardíaco

</div>



<div class="mb-4">

<input
type="checkbox"
th:field="*{ativo}">

Paciente Ativo

</div>



<button
type="submit"
class="btn btn-primary">

Salvar

</button>

</form>


<br>

<div
class="alert alert-success"
th:if="${mensagem}"
th:text="${mensagem}">
</div>


</div>

</body>

</html>
```
